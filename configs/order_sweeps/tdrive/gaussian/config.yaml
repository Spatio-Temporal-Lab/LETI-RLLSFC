experiment:
  name: gaussian
  description: "使用高斯分布查询的基准实验"

datasets:
  active: tdrive
  profiles:
    tdrive:
      description: "Beijing TDrive dataset."
      trajectory_path: "D:/dataset/Trajectory/TDrive/complete_clean/tdrive.txt"
      query_root: "resource/queries/tdrive"
      min_x: 115.29
      min_y: 39.00
      max_x: 117.83
      max_y: 41.50
    cdtaxi:
      description: "Chengdu CDTaxi dataset."
      trajectory_path: "D:/dataset/Trajectory/Chengdu/cleaned_cd_taxi.txt"
      query_root: "resource/queries/chengdu"
      min_x: 104.04
      min_y: 30.65
      max_x: 104.13
      max_y: 30.73

index:
  max_level: 8
  alpha: 3
  beta: 3
  min_x: 115.29
  min_y: 39.00
  max_x: 117.83
  max_y: 41.50
  use_original_bbox: true
  use_prune: true
  min_cell_trajs: 4
  quadcode_include_muted: false
  enable_sig_optimize: true

data:
  num_trajectories: -1
  use_similarity_matrix: true
  similarity_matrix_path: null

reward:
  local_reward_weight: 0.5
  global_reward_weight: 1.0
  global_reward_scale: 2.0
  global_reward_num_evals: 4
  query_distribution_type: "gaussian"

network:
  hidden_dims: [256, 256]
  device: auto
  dropout: 0.1

train:
  num_episodes: 400
  eval_interval: 10
  save_interval: 10
  topk_actions: 30
  topk_decay_episodes: 100
  topk_multipliers: [1.5, 0.5]
  enable_early_stopping: true
  early_stopping_patience: 8
  early_stopping_min_delta: 0.01
  max_negative_streak: 5

paths:
  resource_dir: resource
  outputs_dir: outputs
